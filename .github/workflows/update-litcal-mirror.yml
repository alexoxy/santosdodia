name: Update LitCal mirror and translations

on:
  schedule:
    - cron: '35 3 * * 2'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/sync-litcal-mirror.mjs'
      - 'scripts/mirror-litcal-source.sh'
      - 'scripts/sync-name-translations.mjs'
      - 'scripts/validate-language-quality.mjs'
      - 'scripts/audit-languagetool.mjs'
      - 'data/language-authorities.json'
      - 'lib/language-quality.ts'
      - 'lib/locale-display.ts'
      - '.github/workflows/update-litcal-mirror.yml'

permissions:
  contents: write

concurrency:
  group: litcal-mirror-update
  cancel-in-progress: false

jobs:
  mirror-translate-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out Santos do Dia
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Mirror upstream Apache-2.0 source
        shell: bash
        run: |
          if npm run litcal:source; then
            echo 'Upstream source mirror refreshed.'
          else
            echo 'Upstream source mirror unavailable; retaining the last committed version.'
          fi

      - name: Mirror structured LitCal responses
        run: npm run litcal:sync

      - name: Build multilingual observance catalogue
        env:
          MAX_WIKIDATA_LOOKUPS: '150'
        run: npm run translations:sync

      - name: Enforce script and vocabulary rules
        run: npm run translations:validate

      - name: Run advisory grammar and spelling audit
        continue-on-error: true
        env:
          LANGUAGE_TOOL_URL: https://api.languagetool.org/v2/check
        run: npm run translations:grammar

      - name: Validate production application
        run: npm run build

      - name: Commit mirror and translation updates
        shell: bash
        run: |
          git config user.name 'santosdodia-language-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A data/litcal-mirror data/generated/translation-catalog.json data/generated/translation-quality.json data/generated/languagetool-audit.json
          if [ -d vendor/litcal-api ]; then git add -A vendor/litcal-api; fi
          if git diff --cached --quiet; then
            echo 'No mirror or translation changes.'
            exit 0
          fi
          git commit -m 'Update LitCal mirror and validated translations'
          git push
