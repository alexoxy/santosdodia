name: Update observance data

on:
  schedule:
    - cron: '15 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: observance-data-update
  cancel-in-progress: false

jobs:
  sync-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Synchronise source data
        run: npm run data:sync

      - name: Validate production build
        run: npm run build

      - name: Commit changed snapshot
        shell: bash
        run: |
          if git diff --quiet -- data/generated/source-snapshot.json; then
            echo "No source data changes."
            exit 0
          fi
          git config user.name "santosdodia-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/generated/source-snapshot.json
          git commit -m "Update verified observance snapshot"
          git push
