name: Repair lockfile and audit quality

on:
  push:
    branches: [main]
    paths-ignore:
      - package-lock.json
      - reports/quality-audit.txt

permissions:
  contents: write

concurrency:
  group: repair-quality-main
  cancel-in-progress: true

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies and refresh lockfile
        run: npm install --no-audit --no-fund
      - name: Run quality checks and record diagnostics
        shell: bash
        run: |
          mkdir -p reports
          set +e
          npm run lint > /tmp/lint.log 2>&1
          lint_status=$?
          npx tsc --noEmit > /tmp/typecheck.log 2>&1
          type_status=$?
          npm run build > /tmp/build.log 2>&1
          build_status=$?
          set -e
          {
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Commit: $GITHUB_SHA"
            echo "Lint exit: $lint_status"
            echo "TypeScript exit: $type_status"
            echo "Build exit: $build_status"
            echo
            echo "===== ESLint ====="
            cat /tmp/lint.log
            echo
            echo "===== TypeScript ====="
            cat /tmp/typecheck.log
            echo
            echo "===== Next build ====="
            cat /tmp/build.log
          } > reports/quality-audit.txt
      - name: Commit generated lockfile and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json reports/quality-audit.txt
          if git diff --cached --quiet; then
            echo "No generated changes."
          else
            git commit -m "Refresh lockfile and quality audit"
            git push
          fi
